<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Space Grotesk',Inter,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b14"/>
      <stop offset="1" stop-color="#07070b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="18%" r="55%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="88%" r="50%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8a5ff"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(90,250)">
    <rect width="64" height="64" rx="18" fill="url(#logo)"/>
    <rect x="18" y="18" width="28" height="28" rx="8" fill="#07070b"/>
    <text x="86" y="48" font-size="46" font-weight="700" fill="#f2f2f7" letter-spacing="-1">Lumina</text>
  </g>

  <text x="88" y="400" font-size="78" font-weight="700" fill="#f2f2f7" letter-spacing="-2">The Learning OS</text>
  <text x="88" y="492" font-size="78" font-weight="700" letter-spacing="-2">
    <tspan fill="#f2f2f7">for </tspan><tspan fill="url(#word)">modern teams</tspan>
  </text>

  <text x="92" y="565" font-size="30" font-weight="500" fill="#9b9ba8" letter-spacing="0.5">Netflix-style learning · AI paths · AI tutor</text>

  <g transform="translate(905,205)" opacity="0.95">
    <rect width="210" height="220" rx="22" fill="#10101a" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="34" cy="44" r="15" fill="none" stroke="#2dd4bf" stroke-width="2.5"/>
    <path d="M28 44l5 5 9-10" fill="none" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="50" font-size="17" font-weight="600" fill="#f2f2f7">Data Foundations</text>
    <circle cx="34" cy="100" r="15" fill="url(#logo)"/>
    <path d="M30 93v14l11-7z" fill="#fff"/>
    <text x="62" y="106" font-size="17" font-weight="600" fill="#f2f2f7">Leading with Data</text>
    <circle cx="34" cy="156" r="15" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2.5"/>
    <text x="34" y="162" font-size="15" font-weight="700" fill="#62626e" text-anchor="middle">3</text>
    <text x="62" y="162" font-size="17" font-weight="600" fill="#9b9ba8">Storytelling</text>
  </g>
</svg>

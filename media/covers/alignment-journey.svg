<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#18251c"/>
      <stop offset="0.55" stop-color="#111a13"/>
      <stop offset="1" stop-color="#0c110d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#c8a45d" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#c8a45d" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#c8a45d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.12" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#5a6f50" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#5a6f50" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <rect width="1280" height="720" fill="url(#glow2)"/>

  <!-- rising path with 6 chapter nodes -->
  <path d="M80 560 C 360 540, 520 470, 700 430 S 1050 300, 1200 250" fill="none" stroke="#c8a45d" stroke-opacity="0.5" stroke-width="2"/>
  <g fill="#c8a45d">
    <circle cx="80"  cy="560" r="7" fill-opacity="0.55"/>
    <circle cx="330" cy="516" r="7" fill-opacity="0.6"/>
    <circle cx="560" cy="458" r="7" fill-opacity="0.68"/>
    <circle cx="770" cy="418" r="7" fill-opacity="0.78"/>
    <circle cx="1000" cy="330" r="7" fill-opacity="0.9"/>
    <circle cx="1200" cy="250" r="9"/>
  </g>

  <!-- EdenRise leaf mark -->
  <g transform="translate(96 88) scale(1.5)">
    <path d="M4 37.5V15a11 11 0 0 1 22 0v22.5" stroke="rgba(166,195,165,.55)" stroke-width="1" fill="none"/>
    <g transform="translate(15 0)">
      <path d="M0 33V13" stroke="#b27a52" stroke-width="1.1" stroke-linecap="round"/>
      <g fill="#b27a52">
        <path d="M0 0C-3.4-3-3.4-9 0-12 3.4-9 3.4-3 0 0Z" transform="translate(0 13)"/>
        <path d="M0 0C-3.1-2.6-3.1-8 0-11 3.1-8 3.1-2.6 0 0Z" transform="translate(0 18) rotate(36)"/>
        <path d="M0 0C-3.1-2.6-3.1-8 0-11 3.1-8 3.1-2.6 0 0Z" transform="translate(0 18) rotate(-36)"/>
        <path d="M0 0C-2.9-2.4-2.9-7.4 0-10 2.9-7.4 2.9-2.4 0 0Z" transform="translate(0 23) rotate(60)"/>
        <path d="M0 0C-2.9-2.4-2.9-7.4 0-10 2.9-7.4 2.9-2.4 0 0Z" transform="translate(0 23) rotate(-60)"/>
      </g>
    </g>
  </g>
  <text x="152" y="112" fill="#f7f6f1" font-family="Helvetica, Arial, sans-serif" font-size="24" letter-spacing="6" font-weight="bold">EDENRISE</text>
  <text x="153" y="132" fill="#c8a45d" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="7">ACADEMY</text>

  <!-- title block -->
  <text x="96" y="360" fill="#a6c3a5" font-family="Helvetica, Arial, sans-serif" font-size="20" letter-spacing="8" font-weight="bold">THE TEAM ALIGNMENT JOURNEY</text>
  <text x="92" y="470" fill="#f7f6f1" font-size="104" font-style="italic">Above the Line</text>
  <text x="96" y="556" fill="#c8a45d" font-size="62" font-style="italic">— and beyond.</text>

  <text x="98" y="632" fill="#c2cabb" font-family="Helvetica, Arial, sans-serif" font-size="19" letter-spacing="1" opacity="0.85">Above the Line · No Failure Only Feedback · ESIP · Goal Setting · Beyond Fear · Body, Soul &amp; Spirit</text>
</svg>
